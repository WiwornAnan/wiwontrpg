# Render Blueprint — deploy WiwonAnant on Render's free web service, with a
# permanent-free Neon Postgres as the database.
#
# In the Render dashboard: New → Blueprint → connect this repo → Apply.
# Render will ask for DATABASE_URL (paste your Neon connection string) plus the
# three secrets below. Full walkthrough in DEPLOY.md.

services:
  - type: web
    name: wiwonanant
    runtime: node
    plan: free
    region: singapore # ใกล้ไทยที่สุด (latency ต่ำ)
    # --include=dev: NODE_ENV=production makes npm skip devDeps, but the build
    # (vite, prisma, typescript) and runtime (tsx) need them — force-install.
    buildCommand: npm install --include=dev && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: SESSION_SECRET
        generateValue: true # Render สุ่มให้เอง ปลอดภัย
      # --- ต้องตั้งค่าเองในหน้า Render (Environment) ---
      - key: DATABASE_URL
        sync: false # วาง connection string ของ Neon (ลงท้าย ?sslmode=require)
      - key: DEV_INVITE_CODE
        sync: false # โค้ดลับสำหรับสมัครเป็น dev เช่น WIWON-DEV-2569
      - key: ADMIN_EMAIL
        sync: false # อีเมลแอดมินคนแรก (ล็อกอินเป็น dev ได้ทันที)
      - key: ADMIN_PASSWORD
        sync: false # รหัสผ่านแอดมิน — ตั้งให้ยาว ๆ
