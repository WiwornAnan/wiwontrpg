name: Restore Deleted Item (one-off)

# Recover row(s) hard-deleted from the catalog/articles, from a past backup.
# Restores the backup into a throwaway Postgres, then copies rows whose text
# contains the search term into the live DB. Fails if it recovers nothing, so
# the run status alone tells you whether it worked.

on:
  workflow_dispatch:
    inputs:
      search:
        description: 'Recover rows containing this text (name / title / subtitle)'
        required: true
        default: 'สายเลือดมังกร'
      run_id:
        description: 'Backup run id (28751991686 = 2026-07-05)'
        required: true
        default: '28751991686'
      artifact:
        description: 'Backup artifact name'
        required: true
        default: 'db-backup-20260705-191918'

concurrency:
  group: db-restore
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download the backup artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact }}
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: bk

      - name: Recover matching rows into the live database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEARCH: ${{ inputs.search }}
        run: |
          set -euo pipefail
          DUMP="$(ls bk/*.dump)"
          echo "Using backup: $DUMP"
          LIVE="$(printf '%s' "$DATABASE_URL" | sed 's/-pooler//')"
          case "$LIVE" in
            *sslmode=*) : ;;
            *\?*) LIVE="$LIVE&sslmode=require" ;;
            *) LIVE="$LIVE?sslmode=require" ;;
          esac
          docker run --rm -d --name pg -e POSTGRES_PASSWORD=pass postgres:18
          for i in $(seq 1 30); do docker exec pg pg_isready -U postgres >/dev/null 2>&1 && break; sleep 2; done
          docker cp "$DUMP" pg:/tmp/b.dump
          echo "" | base64 -d > restore.sh
          docker cp restore.sh pg:/tmp/restore.sh
          docker exec -e LIVE="$LIVE" -e SEARCH="$SEARCH" pg bash /tmp/restore.sh
