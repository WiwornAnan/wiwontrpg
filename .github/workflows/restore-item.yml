name: Restore Deleted Item (one-off)

# Lists rows present in a backup but missing from the live DB (i.e. deleted) as
# warning annotations. With apply=true it also copies those rows back into live.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Backup run id (28751991686 = 2026-07-05)'
        required: true
        default: '28751991686'
      artifact:
        description: 'Backup artifact name'
        required: true
        default: 'db-backup-20260705-191918'
      apply:
        description: 'true = actually restore the missing rows; false = list only'
        required: true
        default: 'false'

concurrency:
  group: db-restore
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download the backup artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact }}
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: bk

      - name: Diff backup against live (and restore if apply=true)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPLY: ${{ inputs.apply }}
        run: |
          set -euo pipefail
          DUMP="$(ls bk/*.dump)"
          echo "Using backup: $DUMP"
          LIVE="$(printf '%s' "$DATABASE_URL" | sed 's/-pooler//')"
          case "$LIVE" in
            *sslmode=*) : ;;
            *\?*) LIVE="$LIVE&sslmode=require" ;;
            *) LIVE="$LIVE?sslmode=require" ;;
          esac
          docker run --rm -d --name pg -e POSTGRES_PASSWORD=pass postgres:18
          for i in $(seq 1 30); do docker exec pg pg_isready -U postgres >/dev/null 2>&1 && break; sleep 2; done
          docker cp "$DUMP" pg:/tmp/b.dump
          echo "" | base64 -d > restore.sh
          docker cp restore.sh pg:/tmp/restore.sh
          docker exec -e LIVE="$LIVE" -e APPLY="$APPLY" pg bash /tmp/restore.sh
