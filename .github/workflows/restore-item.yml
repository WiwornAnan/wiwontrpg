name: Restore Deleted Item (one-off)

# mode=find    : full-row text search for 'search' (read-only)
# mode=list    : rows in the backup but missing from live (read-only)
# mode=restore : copy backup row (table+id) into live

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'find | list | restore'
        required: true
        default: 'find'
      search:
        description: 'text to search (mode=find)'
        required: false
        default: 'สายเลือดมังกร'
      table:
        description: 'CatalogItem | Article (mode=restore)'
        required: false
        default: 'Article'
      id:
        description: 'row id (mode=restore)'
        required: false
        default: ''
      run_id:
        description: 'Backup run id (28751991686=07-05, 28719899488=07-04)'
        required: true
        default: '28751991686'
      artifact:
        description: 'Backup artifact name'
        required: true
        default: 'db-backup-20260705-191918'

concurrency:
  group: db-restore
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download the backup artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact }}
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: bk

      - name: Run recovery (${{ inputs.mode }})
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MODE: ${{ inputs.mode }}
          SEARCH: ${{ inputs.search }}
          TABLE: ${{ inputs.table }}
          ID: ${{ inputs.id }}
        run: |
          set -euo pipefail
          DUMP="$(ls bk/*.dump)"
          LIVE="$(printf '%s' "$DATABASE_URL" | sed 's/-pooler//')"
          case "$LIVE" in
            *sslmode=*) : ;;
            *\?*) LIVE="$LIVE&sslmode=require" ;;
            *) LIVE="$LIVE?sslmode=require" ;;
          esac
          docker run --rm -d --name pg -e POSTGRES_PASSWORD=pass postgres:18
          for i in $(seq 1 30); do docker exec pg pg_isready -U postgres >/dev/null 2>&1 && break; sleep 2; done
          docker cp "$DUMP" pg:/tmp/b.dump
          echo "" | base64 -d > rec.sh
          docker cp rec.sh pg:/tmp/rec.sh
          docker exec -e LIVE="$LIVE" -e MODE="$MODE" -e SEARCH="$SEARCH" -e TABLE="$TABLE" -e ID="$ID" pg bash /tmp/rec.sh
