name: Database Backup

on:
  schedule:
    - cron: '0 18 * * *' # ทุกวัน 01:00 (เวลาไทย)
  workflow_dispatch: {}

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL secret is not set."
            exit 1
          fi
          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          docker run --rm -e DATABASE_URL postgres:17 \
            sh -c 'pg_dump "$DATABASE_URL" --no-owner --no-privileges --format=custom' \
            > "backup-$STAMP.dump"
          ls -lh "backup-$STAMP.dump"
      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.STAMP }}
          path: backup-*.dump
          retention-days: 30
          if-no-files-found: error
