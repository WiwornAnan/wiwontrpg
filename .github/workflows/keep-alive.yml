name: Keep Alive

# Pings the public health endpoint every 5 minutes so the free-tier Render
# instance never idles down (spins down after ~15 min) and the Neon database
# compute stays awake — which prevents the "stale DB connection → 500 on every
# request" outage that needs a manual restart to clear.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping health endpoint
        run: |
          URL="https://wiwontrpg.onrender.com/api/health"
          # A cold Render instance takes ~50s to wake, so allow a generous
          # per-request timeout and retry a few times before giving up.
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$URL" || echo 000)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "service is awake"
              exit 0
            fi
            sleep 20
          done
          # Don't fail the job (avoids noisy emails on a slow cold start); just warn.
          echo "::warning::health check did not return 200 after retries"
